<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#964300",
                    "tertiary-container": "#ff9655",
                    "on-primary-fixed": "#443700",
                    "surface-container-high": "#e0e3e4",
                    "primary-fixed-dim": "#ebc729",
                    "background": "#f5f6f7",
                    "error-container": "#f95630",
                    "primary-container": "#fad538",
                    "surface-container": "#e6e8ea",
                    "on-error-container": "#520c00",
                    "surface-dim": "#d1d5d7",
                    "secondary-fixed": "#bcd2ff",
                    "secondary-container": "#bcd2ff",
                    "surface": "#f5f6f7",
                    "surface-bright": "#f5f6f7",
                    "on-surface-variant": "#595c5d",
                    "on-tertiary-fixed": "#2d0f00",
                    "on-secondary": "#eff2ff",
                    "surface-variant": "#dadddf",
                    "tertiary-dim": "#843a00",
                    "on-background": "#2c2f30",
                    "secondary": "#005ab2",
                    "inverse-primary": "#fad538",
                    "inverse-surface": "#0c0f10",
                    "outline-variant": "#abadae",
                    "on-primary": "#fff2ce",
                    "primary-dim": "#5f4e00",
                    "on-secondary-fixed-variant": "#004f9e",
                    "on-secondary-container": "#00468e",
                    "secondary-dim": "#004e9d",
                    "outline": "#757778",
                    "error-dim": "#b92902",
                    "surface-tint": "#6d5a00",
                    "on-error": "#ffefec",
                    "on-tertiary-container": "#532200",
                    "error": "#b02500",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#eff1f2",
                    "on-tertiary": "#fff0e9",
                    "tertiary-fixed-dim": "#f6853b",
                    "inverse-on-surface": "#9b9d9e",
                    "tertiary-fixed": "#ff9655",
                    "primary-fixed": "#fad538",
                    "on-secondary-fixed": "#00336b",
                    "surface-container-highest": "#dadddf",
                    "primary": "#6d5a00",
                    "on-primary-fixed-variant": "#655300",
                    "secondary-fixed-dim": "#a5c5ff",
                    "on-tertiary-fixed-variant": "#612900",
                    "on-primary-container": "#5a4a00",
                    "on-surface": "#2c2f30"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "2xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .plusJakartaSans { font-family: 'Plus Jakarta Sans', sans-serif; }
        .inter { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .toy-pattern {
            background-color: #f5f6f7;
            background-image: radial-gradient(#fad538 1.5px, transparent 1.5px), radial-gradient(#bcd2ff 1.5px, #f5f6f7 1.5px);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col relative overflow-hidden">
<!-- Subtle Background Elements -->
<div class="absolute inset-0 toy-pattern -z-10"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl"></div>
<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-md relative">
<!-- Floating Decorative Icons (Asymmetric) -->
<div class="absolute -top-12 -right-8 p-4 bg-tertiary-container rounded-xl shadow-xl shadow-tertiary/10 rotate-12 hidden md:block">
<span class="material-symbols-outlined text-on-tertiary-container text-4xl" data-icon="rocket_launch">rocket_launch</span>
</div>
<div class="absolute -bottom-10 -left-12 p-4 bg-secondary-container rounded-xl shadow-xl shadow-secondary/10 -rotate-12 hidden md:block">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" data-icon="toys">toys</span>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-2xl p-8 md:p-12 shadow-xl shadow-primary/5 relative z-10">
<div class="flex flex-col items-center text-center mb-10">
<div class="w-20 h-20 bg-primary-container rounded-xl flex items-center justify-center mb-6 shadow-inner shadow-white/30">
<span class="material-symbols-outlined text-on-primary-container text-5xl" data-icon="smart_toy" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<h1 class="plusJakartaSans text-3xl font-extrabold text-on-surface tracking-tight leading-tight">
                        Welcome Back, Manager
                    </h1>
<p class="inter text-on-surface-variant mt-2 font-medium">
                        Enter your credentials to access the toybox.
                    </p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="inter text-sm font-bold text-on-surface ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all inter placeholder:text-outline-variant font-medium" placeholder="manager@toybox.joy" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="inter text-sm font-bold text-on-surface">Password</label>
<a class="inter text-xs font-bold text-secondary hover:text-on-secondary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all inter placeholder:text-outline-variant font-medium" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="flex items-center space-x-2 px-1">
<input class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary-container bg-surface-container-low" id="remember" type="checkbox"/>
<label class="inter text-sm font-semibold text-on-surface-variant cursor-pointer" for="remember">Keep me logged in</label>
</div>
<button class="w-full py-4 bg-primary-container hover:bg-primary-fixed-dim text-on-primary-fixed font-extrabold rounded-full transition-all shadow-lg shadow-primary/10 hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2 plusJakartaSans group" type="submit">
                        Sign Into Dashboard
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Help Link -->
<div class="mt-8 pt-8 border-t border-surface-variant/50 text-center">
<p class="inter text-sm text-on-surface-variant">
                        Need assistance? 
                        <a class="text-tertiary font-bold hover:underline" href="#">Contact Support</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer - Shell Suppression Applied (Transactional Page) but keeping Branding as requested -->
<footer class="absolute bottom-8 w-full flex flex-col items-center gap-2 px-6">
<div class="flex gap-6 mb-2">
<a class="inter text-xs font-medium text-slate-500 hover:text-yellow-500 transition-colors" href="#">Privacy Policy</a>
<a class="inter text-xs font-medium text-slate-500 hover:text-yellow-500 transition-colors" href="#">Support</a>
<a class="inter text-xs font-medium text-slate-500 hover:text-yellow-500 transition-colors" href="#">Terms of Service</a>
</div>
<p class="inter text-xs font-medium text-slate-500 text-center">
            © 2024 JoyBox Play Management System. All Rights Reserved.
        </p>
</footer>
</body></html>
